name: Verified Coding Loop

on:
  push:
    paths:
      - 'verified-coding-loop-dashboard/**'
      - '.github/workflows/verified-coding-loop.yml'
  pull_request:
    paths:
      - 'verified-coding-loop-dashboard/**'
      - '.github/workflows/verified-coding-loop.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    name: Test, build, and gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verified-coding-loop-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run deterministic quality tests
        run: npm run test

      - name: Build dashboard
        run: npm run build

      - name: Run verified improvement gate
        run: npm run verify:self-improve

      - name: Re-run tests after verified update
        run: npm run test

      - name: Re-build after verified update
        run: npm run build

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verified-improvement-report
          path: verified-coding-loop-dashboard/verified-improvement-report.json

      - name: Create pull request for verified updates
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Verified coding loop: update learning state'
          title: 'Verified coding loop update'
          body: |
            This pull request was created by the Verified Coding Loop workflow.

            It only proposes updates after:
            - deterministic quality tests pass
            - production build passes
            - verified improvement gate approves the change
            - tests and build pass again after the update

            It does not auto-merge. Human review remains required.
          branch: bot/verified-coding-loop-update
          delete-branch: true
          add-paths: |
            verified-coding-loop-dashboard/src/data/verifiedLearningState.json
            verified-coding-loop-dashboard/verified-improvement-report.json
