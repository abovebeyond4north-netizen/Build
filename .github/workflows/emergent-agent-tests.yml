name: emergent-agent-tests

on:
  push:
    paths:
      - "emergent_intelligence_agent/**"
      - ".github/workflows/emergent-agent-tests.yml"
  pull_request:
    paths:
      - "emergent_intelligence_agent/**"
      - ".github/workflows/emergent-agent-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emergent_intelligence_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run CLI smoke test
        run: python -m emergent_agent.cli --evolve "Build reasoning language and data skills"
